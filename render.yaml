services:
  - type: web
    name: stridesense-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1d
      - key: CORS_ORIGIN
        value: https://stridesense-frontend.onrender.com
      - key: PORT
        value: 3000
